# Security Scanning Pipeline
# Runs dependency vulnerability checks on every push and PR.
# This catches known security issues in our third-party packages
# BEFORE they reach production.

name: Security

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ---- Job 1: Dependency vulnerability scan ----
  # Checks if any of our pip packages have known CVEs
  # (Common Vulnerabilities and Exposures)
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install .
          # Generate requirements.txt for Snyk to scan
          uv pip freeze > requirements.txt

      # Snyk scans requirements.txt for packages with known vulnerabilities
      # --severity-threshold=high: only block on high/critical severity
      # Low and medium severity issues are reported but don't fail the build
      - name: Run Snyk security scan
        uses: snyk/actions/python-3.10@master
        continue-on-error: true       # Report issues but don't block (for demo)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt

  # ---- Job 2: Docker image scan ----
  # Scans the built Docker image for OS-level vulnerabilities
  # (outdated system packages, known CVEs in base image)
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-classic:scan .

      # Trivy is a free, open-source vulnerability scanner
      # It scans the Docker image for OS package and Python package vulnerabilities
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-classic:scan
          format: table
          severity: HIGH,CRITICAL       # Only report high and critical
          exit-code: 0                  # Report but don't fail (for demo)

  # ---- Job 3: SonarCloud code quality scan ----
  # Scans YOUR source code (not dependencies) for:
  #   - Bugs: null pointer risks, resource leaks
  #   - Code Smells: overly complex functions, duplicated code
  #   - Security Hotspots: hardcoded passwords, injection patterns
  #   - Test Coverage: what % of code is covered by tests
  sonarcloud:
    name: SonarCloud Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                # Full history needed for accurate analysis

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies and run tests with coverage
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install ".[test]"
          # Run tests with coverage report in XML format (SonarCloud reads this)
          pytest tests/ -v --cov=app --cov-report=xml

      # SonarCloud scans the code and uploads results to the dashboard
      # Dashboard shows: bugs, code smells, coverage %, security hotspots
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=fnusatvik07
            -Dsonar.projectKey=fnusatvik07_rag-cicd
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=app/
            -Dsonar.tests=tests/
            -Dsonar.host.url=https://sonarcloud.io
