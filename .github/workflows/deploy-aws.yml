# CD Pipeline - Deploy to AWS App Runner (Production)
# Triggers on push to main branch.
#
# Flow:
#   1. CI passes (lint, test)
#   2. Build Docker image
#   3. Push to ECR (Elastic Container Registry)
#   4. Deploy to App Runner (serverless containers on AWS)

name: "Deploy: AWS (Prod)"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-classic
  APP_RUNNER_SERVICE: rag-classic-prod

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install ".[test]"
          uv pip install ruff

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Test
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  deploy:
    name: Build & Deploy to AWS
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Step 1: Login to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 2: Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 3: Build and push Docker image
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # Step 4: Create App Runner access role (first time only)
      - name: Ensure ECR access role exists
        run: |
          aws iam get-role --role-name AppRunnerECRAccessRole 2>/dev/null || \
          aws iam create-role \
            --role-name AppRunnerECRAccessRole \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "build.apprunner.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }'

          aws iam attach-role-policy \
            --role-name AppRunnerECRAccessRole \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess \
            2>/dev/null || true

      # Step 5: Write App Runner config
      - name: Write App Runner config
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PINECONE_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          ROLE_ARN=$(aws iam get-role --role-name AppRunnerECRAccessRole --query 'Role.Arn' --output text)
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

          python3 -c "
          import json
          config = {
            'AuthenticationConfiguration': {'AccessRoleArn': '$ROLE_ARN'},
            'AutoDeploymentsEnabled': False,
            'ImageRepository': {
              'ImageIdentifier': '$IMAGE_URI',
              'ImageRepositoryType': 'ECR',
              'ImageConfiguration': {
                'Port': '8080',
                'RuntimeEnvironmentVariables': {
                  'PINECONE_API_KEY': '''$PINECONE_KEY''',
                  'OPENAI_API_KEY': '''$OPENAI_KEY''',
                  'LANGSMITH_TRACING': 'true',
                  'LANGSMITH_ENDPOINT': 'https://api.smith.langchain.com',
                  'LANGSMITH_API_KEY': '''$LANGSMITH_KEY''',
                  'LANGSMITH_PROJECT': 'rag-classic-prod',
                  'PORT': '8080'
                }
              }
            }
          }
          with open('/tmp/source-config.json', 'w') as f:
            json.dump(config, f)
          "

      # Step 6: Deploy to App Runner
      - name: Deploy to App Runner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn | [0]" \
            --output text 2>/dev/null)

          if [ "$SERVICE_ARN" = "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name $APP_RUNNER_SERVICE \
              --source-configuration file:///tmp/source-config.json \
              --instance-configuration '{"Cpu":"1024","Memory":"2048"}' \
              --health-check-configuration '{"Protocol":"HTTP","Path":"/health","Interval":10,"Timeout":5,"HealthyThreshold":1,"UnhealthyThreshold":5}'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn $SERVICE_ARN \
              --source-configuration file:///tmp/source-config.json
          fi

      # Step 6: Wait for deployment and show URL
      - name: Show deployed URL
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn | [0]" \
            --output text)

          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn $SERVICE_ARN \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "🚀 Deployed to: https://$SERVICE_URL"
          echo "   Environment: production (AWS)"
          echo "   LangSmith: rag-classic-prod"
          echo "   Health: https://$SERVICE_URL/health"
          echo "   Docs: https://$SERVICE_URL/docs"
