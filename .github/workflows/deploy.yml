# CD Pipeline - Environment-based deployment to Google Cloud Run
#
# Branch -> Environment mapping:
#   develop -> Dev   (rag-classic-dev,  LANGSMITH_PROJECT=rag-classic-dev)
#   staging -> Stage (rag-classic-stage, LANGSMITH_PROJECT=rag-classic-staging)
#   main    -> Prod  (rag-classic-prod,  LANGSMITH_PROJECT=rag-classic-prod)

name: "Deploy: GCP (Dev/Prod)"

on:
  push:
    branches: [develop, main]

env:
  GCP_PROJECT_ID: rag-pipeline-493809
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/rag-pipeline-493809/rag-classic/rag-classic

jobs:
  # ---- Job 1: CI checks (must pass before deploy) ----
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install ".[test]"
          uv pip install ruff

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Test
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  # ---- Job 2: Set environment based on branch ----
  set-env:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      service_name: ${{ steps.env.outputs.service_name }}
      langsmith_project: ${{ steps.env.outputs.langsmith_project }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment from branch
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "service_name=rag-classic-dev" >> $GITHUB_OUTPUT
            echo "langsmith_project=rag-classic-dev" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "service_name=rag-classic-stage" >> $GITHUB_OUTPUT
            echo "langsmith_project=rag-classic-staging" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "service_name=rag-classic-prod" >> $GITHUB_OUTPUT
            echo "langsmith_project=rag-classic-prod" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

  # ---- Job 3: Build & Deploy ----
  deploy:
    name: Deploy to ${{ needs.set-env.outputs.environment }}
    needs: [ci, set-env]
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (${{ needs.set-env.outputs.environment }})
        run: |
          gcloud run deploy ${{ needs.set-env.outputs.service_name }} \
            --image $IMAGE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "^##^PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}##OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}##LANGSMITH_TRACING=true##LANGSMITH_ENDPOINT=https://api.smith.langchain.com##LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}##LANGSMITH_PROJECT=${{ needs.set-env.outputs.langsmith_project }}" \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --cpu-boost \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ needs.set-env.outputs.service_name }} --region $GCP_REGION --format 'value(status.url)')
          echo "🚀 Deployed to: $URL"
          echo "   Environment: ${{ needs.set-env.outputs.environment }}"
          echo "   LangSmith: ${{ needs.set-env.outputs.langsmith_project }}"
          echo "   Health: $URL/health"
          echo "   Docs: $URL/docs"
