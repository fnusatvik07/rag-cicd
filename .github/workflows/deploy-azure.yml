# CD Pipeline - Deploy to Azure Container Apps (Staging)
# Triggers on push to staging branch.
#
# Flow:
#   1. CI passes (lint, test)
#   2. Build Docker image
#   3. Push to ACR (Azure Container Registry)
#   4. Deploy to Azure Container Apps

name: "Deploy: Azure (Staging)"

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rag-classic-rg
  AZURE_LOCATION: eastus2
  CONTAINER_APP_NAME: rag-classic-stage
  CONTAINER_APP_ENV: rag-classic-env
  ACR_NAME: ragclassicacr

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install ".[test]"
          uv pip install ruff

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Test
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  deploy:
    name: Build & Deploy to Azure
    needs: ci
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # Step 1: Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 2: Login to ACR
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Step 3: Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/$CONTAINER_APP_NAME:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$CONTAINER_APP_NAME:${{ github.sha }}

      # Step 4: Create Container Apps environment
      - name: Create Container Apps environment
        run: |
          az containerapp env create \
            --name $CONTAINER_APP_ENV \
            --resource-group $AZURE_RESOURCE_GROUP \
            --location $AZURE_LOCATION \
            2>&1 || echo "Environment already exists, continuing..."

      # Step 5: Check if app exists
      - name: Check if app exists
        id: check-app
        run: |
          if az containerapp show --name $CONTAINER_APP_NAME --resource-group $AZURE_RESOURCE_GROUP > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Step 6a: Create app (first deploy)
      - name: Create Container App
        if: steps.check-app.outputs.exists == 'false'
        run: |
          az containerapp create \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --environment $CONTAINER_APP_ENV \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/$CONTAINER_APP_NAME:${{ github.sha }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 8080 \
            --ingress external \
            --cpu 2 \
            --memory 4Gi \
            --min-replicas 0 \
            --max-replicas 3 \
            --env-vars \
              "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" \
              "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
              "LANGSMITH_TRACING=true" \
              "LANGSMITH_ENDPOINT=https://api.smith.langchain.com" \
              "LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}" \
              "LANGSMITH_PROJECT=rag-classic-staging" \
              "PORT=8080"

      # Step 6b: Update app (subsequent deploys)
      - name: Update Container App
        if: steps.check-app.outputs.exists == 'true'
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/$CONTAINER_APP_NAME:${{ github.sha }} \
            --set-env-vars \
              "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" \
              "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
              "LANGSMITH_TRACING=true" \
              "LANGSMITH_ENDPOINT=https://api.smith.langchain.com" \
              "LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}" \
              "LANGSMITH_PROJECT=rag-classic-staging" \
              "PORT=8080"

      # Step 6: Show the deployed URL
      - name: Show deployed URL
        run: |
          FQDN=$(az containerapp show \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "🚀 Deployed to: https://$FQDN"
          echo "   Environment: staging (Azure)"
          echo "   LangSmith: rag-classic-staging"
          echo "   Health: https://$FQDN/health"
          echo "   Docs: https://$FQDN/docs"
